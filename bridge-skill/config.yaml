# AgentCompanion Bridge Skill Configuration
# Copy this file and fill in your values.

# Backend API base URL (no trailing slash)
backend_url: "https://your-backend.railway.app"

# Instance ID (UUID) — from Settings > Instances in the app
instance_id: "00000000-0000-0000-0000-000000000000"

# Instance shared secret — generated when the instance was created
instance_secret: "your-instance-shared-secret"

# Default source_type for events. One of: gateway, skill, telegram, sensor
default_source_type: "skill"

# HTTP request timeout in seconds
timeout: 10

# Number of retry attempts on failure
retries: 2
